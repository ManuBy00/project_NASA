

<div class="search-wrapper">
  <span class="material-icons search-icon">search: </span>
  <input #searchInput
    type="text" 
    [placeholder]="" 
    (keyup.enter) = "searchByWord()"
    class="search-input"
  >
</div>
<div class="gallery">
    @for (item of filteredFav(); track $index) {
    <app-apod-item [apodResponse]="item"></app-apod-item>
    }
</div>
