@if (isLoading()) {
  <div class="loading">
    <svg width="100" height="100" viewBox="0 0 50 50">
        <circle cx="25" cy="25" r="20" fill="none" stroke="#0b3d91" stroke-width="4" stroke-dasharray="80" stroke-dashoffset="60">
            <animateTransform attributeName="transform" type="rotate" repeatCount="indefinite" dur="1s" values="0 25 25;360 25 25"/>
        </circle>
    </svg>
  </div>
}
@if (apod(); as data) {
    <header class="apod-top-bar">
      <a [routerLink]= "['/']" class="back-link">
        Back to gallery
      </a>
    </header>

    <main class="apod-main-container">
      
      <section class="apod-media-column">
        <div class="apod-media-wrapper">
            <img 
              [src]="data.hdurl || data.url" 
              [alt]="data.title" 
              class="apod-image">
        </div>
      
      </section>

      <section class="apod-info-column">
        <h1 class="apod-title">{{ data.title }}</h1>

        <div class="apod-description-box">
          <h2 class="description-title">Description</h2>
          <div class="description-content">
            <p>{{ data.explanation }}</p>
          </div>
          <br>
          <p>Date: {{data.date}}</p>
          <p>Author: {{data.copyright}}</p>
        </div>
        @if (isFavourite()) {
          <button class="btn-favourite" (click)="addToFavourites()">Remove from favourites</button>
        }@else{
          <button class="btn-favourite" (click)="addToFavourites()">Add to favourites</button>
        }
        
      </section>
  
    </main>
  }
